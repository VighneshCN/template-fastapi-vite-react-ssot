name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  guardrails:
    name: Guardrails (ADR + Contracts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run guardrails script
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python .github/scripts/guardrails.py

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    needs: [ guardrails ]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../../requirements.txt -r ../../requirements-dev.txt

      - name: Run tests
        run: |
          pytest -q

  frontend:
    name: Frontend (lint/test/build)
    runs-on: ubuntu-latest
    needs: [ guardrails ]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install

      - name: Lint
        run: |
          npm run lint

      - name: Test
        run: |
          npm test

      - name: Build
        run: |
          npm run build